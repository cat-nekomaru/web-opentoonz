<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WebGL Canvas Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  font-family: monospace;
}
#info {
  color: #8f8;
  font-size: 11px;
  padding: 4px 8px;
  background: rgba(0,0,0,0.6);
  white-space: nowrap;
  overflow: hidden;
}
#glcanvas {
  /* 元画像 6400x4000 のアスペクト比 = 1.6 */
  width:  min(100vw, calc((100dvh - 30px) * 1.6));
  height: min(calc(100vw / 1.6), calc(100dvh - 30px));
  margin: auto;
  display: block;
  touch-action: none;
}
</style>
</head>
<body>
<div id="info">読み込み中...</div>
<canvas id="glcanvas"></canvas>
<script type="module" src="./src/main_webGL_02.js"></script>
</body>
</html>
