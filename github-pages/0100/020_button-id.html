<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-OpenToonz Mockup</title>
    <style>
        /* 共通スタイル */
        body {
            margin: 0;
            padding: 10px;
            font-family: sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            margin: 5px 0;
            font-size: 1.2rem;
        }

        /* ログ出力エリア */
        #status-log {
            width: 90%;
            max-width: 600px;
            background: #111;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #0f0;
            text-align: center;
            border: 1px solid #333;
        }

        /* テーブル共通 */
        table {
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        td {
            border: 1px solid #777;
            padding: 8px;
            text-align: center;
            user-select: none;
        }

        /* 各種要素の見た目 */
        .btn {
            display: inline-block;
            background-color: #555;
            border: 1px solid #aaa;
            border-radius: 3px;
            padding: 2px 6px;
            margin: 2px;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
        }
        .btn:hover { background-color: #777; }
        .btn:active { background-color: #333; }

        .text-disp { font-style: italic; color: #ffeb3b; }
        .widget-disp { font-size: 0.9rem; color: #a8ffb2; }

        /* キャンバス領域 */
        .canvas-wrapper {
            padding: 10px 0;
        }
        canvas {
            background-color: #fff;
            border: 2px solid #000;
            cursor: crosshair;
        }

        /* --- レスポンシブ表示切り替え --- */
        /* 初期状態：両方非表示 */
        #layout-tablet, #layout-smartphone { display: none; }

        /* 画面幅 601px 以上：タブレット版を表示 */
        @media (min-width: 601px) {
            #layout-tablet { display: table; width: 90%; max-width: 700px; }
            #current-view::before { content: "【タブレット表示中（画面幅が広い状態）】"; color: #00bcd4; }
        }

        /* 画面幅 600px 以下：スマートフォン版を表示 */
        @media (max-width: 600px) {
            #layout-smartphone { display: table; width: 95%; }
            #current-view::before { content: "【スマートフォン表示中（画面幅が狭い状態）】"; color: #ff5722; }
        }
    </style>
</head>
<body>

    <h2 id="current-view"></h2>
    <!-- アクションを視覚化するログ（デバッグ用） -->
    <div id="status-log">画面上のボタンを押すか、キャンバスにお絵描きしてみてください。</div>

    <!-- ==========================================
         1. タブレット用レイアウトテーブル
         ========================================== -->
    <table id="layout-tablet" border="1">
        <!-- 1行目: 上部ツールバー -->
        <tr align="center" bgcolor="#443">
            <td id="t-cell-top-left">
                <span class="btn" id="t-btn-a">A</span>
                <span class="btn" id="t-btn-b">B</span>
            </td>
            <td id="t-cell-top-center" colspan="2">
                <span class="text-disp" id="t-text-h">H, text</span>
            </td>
            <td id="t-cell-top-right">
                <span class="btn" id="t-btn-c">C</span>
                <span class="btn" id="t-btn-d">D</span>
                <span class="btn" id="t-btn-e">E</span>
                <span class="btn" id="t-btn-f">F</span>
                <span class="btn" id="t-btn-g">G</span>
            </td>
        </tr>
        <!-- 2行目: メインキャンバス領域 -->
        <tr align="center" valign="center" bgcolor="#445">
            <td id="t-canvas-container" colspan="4" class="canvas-wrapper">
                <div><span class="text-disp" id="t-canvas-i">I, canvas</span></div>
                <!-- タブレット用お絵描きエリア -->
                <canvas id="canvas-tablet" width="500" height="300"></canvas>
            </td>
        </tr>
        <!-- 3行目: 下部操作エリア（上段） -->
        <tr align="center">
            <td id="t-widget-left-container" rowspan="2" bgcolor="#444">
                <div class="widget-disp"><span class="btn" id="t-widget-j">J</span>, <span class="btn" id="t-widget-k">K</span></div>
            </td>
            <td id="t-btn-o-container" bgcolor="#544">
                <span class="btn" id="t-btn-o">O</span>
            </td>
            <td id="t-group-top-container" bgcolor="#544">
                <span class="btn" id="t-btn-q">Q</span>
                <span class="btn" id="t-btn-r">R</span>
                <span class="btn" id="t-btn-s">S</span>
                <span class="btn" id="t-btn-t">T</span>
                <span class="btn" id="t-btn-u">U</span>
            </td>
            <td id="t-widget-right-container" rowspan="2" bgcolor="#444">
                <div class="widget-disp"><span class="btn" id="t-widget-l">L</span>, <span class="btn" id="t-widget-m">M</span>, <span class="btn" id="t-widget-n">N</span></div>
            </td>
        </tr>
        <!-- 4行目: 下部操作エリア（下段） -->
        <tr align="center" bgcolor="#655">
            <td id="t-btn-p-container">
                <span class="btn" id="t-btn-p">P</span>
            </td>
            <td id="t-group-bottom-container">
                <span class="btn" id="t-btn-v">V</span>
                <span class="btn" id="t-btn-w">W</span>
                <span class="btn" id="t-btn-x">X</span>
                <span class="btn" id="t-btn-y">Y</span>
                <span class="btn" id="t-btn-z">Z</span>
            </td>
        </tr>
    </table>


    <!-- ==========================================
         2. スマートフォン用レイアウトテーブル
         ========================================== -->
    <table id="layout-smartphone" border="1">
        <tr align="center" bgcolor="#655">
            <td id="s-cell-top">
                <span class="btn" id="s-btn-c">C</span>
                <span class="btn" id="s-btn-d">D</span>
                <span class="btn" id="s-btn-e">E</span>
                <span class="btn" id="s-btn-f">F</span>
                <span class="btn" id="s-btn-g">G</span>
            </td>
        </tr>
        <tr align="center" valign="center" bgcolor="#445">
            <td id="s-canvas-container" class="canvas-wrapper">
                <div><span class="text-disp" id="s-canvas-i">I, canvas</span></div>
                <!-- スマホ用お絵描きエリア -->
                <canvas id="canvas-smartphone" width="300" height="250"></canvas>
            </td>
        </tr>
        <tr align="center" bgcolor="#544">
            <td id="s-cell-bottom">
                <span class="btn" id="s-btn-q">Q</span>
                <span class="btn" id="s-btn-r">R</span>
                <span class="btn" id="s-btn-s">S</span>
                <span class="btn" id="s-btn-t">T</span>
                <span class="btn" id="s-btn-u">U</span>
            </td>
        </tr>
    </table>

    <!-- ==========================================
         3. 動作のためのJavaScript
         ========================================== -->
    <script>
        const logDiv = document.getElementById('status-log');

        // --- 1. すべてのボタンにクリックイベントを設定 ---
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', (e) => {
                // 押されたボタンのテキスト（A, B, C...）を取得
                const buttonId = e.target.textContent;
                logDiv.textContent = `イベント検知: ボタン「 ${buttonId} 」がクリックされました！`;
                logDiv.style.color = "#00f0ff";
            });
        });

        // --- 2. お絵描き（Canvas）処理の実装 ---
        function setupCanvas(canvasId) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let drawing = false;

            // 線のスタイル指定
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';

            // マウス/タッチ操作イベントの登録
            const startDraw = (e) => {
                drawing = true;
                draw(e);
            };
            const endDraw = () => {
                drawing = false;
                ctx.beginPath();
            };
            const draw = (e) => {
                if (!drawing) return;
                e.preventDefault();

                // マウスとタッチ両方の座標取得に対応
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);

                logDiv.textContent = `キャンバス描画中... 座標: (${Math.round(x)}, ${Math.round(y)})`;
                logDiv.style.color = "#0f0";
            };

            // マウスイベント
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseleave', endDraw);

            // タッチイベント（スマホ・タブレット用）
            canvas.addEventListener('touchstart', startDraw);
            canvas.addEventListener('touchend', endDraw);
            canvas.addEventListener('touchmove', draw);
        }

        // 両方のキャンバスを有効化
        setupCanvas('canvas-tablet');
        setupCanvas('canvas-smartphone');
    </script>
</body>
</html>
