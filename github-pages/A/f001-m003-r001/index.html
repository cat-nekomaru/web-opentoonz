<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>m003_ws_pngPalette</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:           #14161B;
    --panel:        #1B1E25;
    --panel-raised: #21242C;
    --line:         #2C3038;
    --text:         #E7E9EE;
    --text-dim:     #8B919C;
    --accent-go:    #39FF6A;   /* 通信/送信成功・稼働を示す */
    --accent-warn:  #FFB454;   /* 設定/注意を示す */
    --accent-err:   #FF5C5C;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
  }

  .app{
    max-width:1180px;
    margin:0 auto;
    padding:28px 20px 60px;
  }

  /* ---------- ヘッダー ---------- */
  header.head{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
    border-bottom:1px solid var(--line);
    padding-bottom:18px;
    margin-bottom:24px;
  }
  .head-title{
    font-family:var(--mono);
    font-size:22px;
    font-weight:700;
    letter-spacing:0.5px;
    color:var(--text);
  }
  .head-title span{ color:var(--accent-go); }
  .head-meta{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-dim);
    display:flex;
    gap:16px;
    flex-wrap:wrap;
  }
  .head-meta b{ color:var(--text-dim); font-weight:600; }
  .head-meta .val{ color:var(--text); }

  /* ---------- 接続状態バー ---------- */
  .conn-bar{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:var(--mono);
    font-size:12px;
    margin-bottom:22px;
    color:var(--text-dim);
  }
  .conn-dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--accent-err);
    box-shadow:0 0 0 0 rgba(255,92,92,0.5);
    transition:background .2s;
  }
  .conn-dot.live{
    background:var(--accent-go);
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(57,255,106,0.45); }
    70%{ box-shadow:0 0 0 6px rgba(57,255,106,0); }
    100%{ box-shadow:0 0 0 0 rgba(57,255,106,0); }
  }
  .conn-bar input[type=text]{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    font-family:var(--mono);
    font-size:12px;
    padding:6px 10px;
    border-radius:5px;
    width:240px;
  }
  .conn-bar button{
    font-family:var(--mono);
    font-size:12px;
    padding:6px 12px;
    border-radius:5px;
    border:1px solid var(--line);
    background:var(--panel-raised);
    color:var(--text);
    cursor:pointer;
  }
  .conn-bar button:hover{ border-color:var(--accent-go); }

  /* ---------- メイングリッド ---------- */
  .grid{
    display:grid;
    grid-template-columns: minmax(260px, 320px) minmax(280px, 1fr);
    gap:20px;
    align-items:start;
  }
  .card-log{
    grid-column: 1 / -1; /* 全カラムを占有し、常に次の行へ折り返す */
  }
  @media (max-width: 980px){ // ⭐️
    .grid{ grid-template-columns: 1fr; }
  }

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px;
  }
  .card h2{
    font-family:var(--mono);
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-dim);
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card h2::before{
    content:'';
    width:6px; height:6px;
    background:var(--accent-go);
    display:inline-block;
    border-radius:1px;
  }

  /* ---------- ボタン群 (操作パネル) ---------- */
  .btn-row{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
  }
  .op-btn{
    font-family:var(--mono);
    font-size:13px;
    font-weight:600;
    padding:12px 14px;
    border-radius:7px;
    border:1px solid var(--line);
    background:var(--panel-raised);
    color:var(--text);
    cursor:pointer;
    text-align:left;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:transform .08s, border-color .15s, background .15s;
  }
  .op-btn:hover{ border-color:var(--accent-go); }
  .op-btn:active{ transform:translateY(1px) scale(0.99); }
  .op-btn .tag{
    font-size:10px;
    color:var(--text-dim);
    font-weight:400;
  }
  .op-btn.primary{ border-color:rgba(57,255,106,0.35); }
  .op-btn.primary:hover{ background:rgba(57,255,106,0.08); }
  .op-btn.secondary{ border-color:rgba(255,180,84,0.35); }
  .op-btn.secondary:hover{ background:rgba(255,180,84,0.08); }
  .op-btn.danger{ border-color:rgba(255,92,92,0.3); }
  .op-btn.danger:hover{ background:rgba(255,92,92,0.08); }
  .op-btn:disabled{
    opacity:0.4; cursor:not-allowed; transform:none;
  }

  /* ---------- パレット設定パネル ---------- */
  .field{ margin-bottom:16px; }
  .field label{
    display:flex;
    justify-content:space-between;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .field label .v{ color:var(--text); }

  input[type=number]{
    width:100%;
    background:var(--panel-raised);
    border:1px solid var(--line);
    color:var(--text);
    font-family:var(--mono);
    font-size:13px;
    padding:8px 10px;
    border-radius:6px;
  }
  input[type=range]{
    width:100%;
    accent-color: var(--accent-go);
    height:4px;
  }
  .slider-r::-webkit-slider-thumb{ background:#FF5C5C; }

  .palette-preview{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:4px;
    margin-bottom:18px;
    padding:10px;
    background:var(--panel-raised);
    border:1px solid var(--line);
    border-radius:7px;
  }
  .swatch{
    width:34px; height:34px;
    border-radius:6px;
    border:1px solid rgba(255,255,255,0.12);
    flex-shrink:0;
  }
  .swatch-label{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    line-height:1.5;
  }
  .swatch-label b{ color:var(--text); }

  /* ---------- 画像表示エリア (uiID=H) ---------- */
  .canvas-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:420px;
    background:
      repeating-conic-gradient(#222630 0% 25%, #1A1D24 0% 50%) 50% / 18px 18px;
    border-radius:8px;
    border:1px solid var(--line);
    position:relative;
    overflow:hidden;
  }
  #imgDisplay{
    max-width:100%;
    max-height:480px;
    image-rendering: pixelated;
    display:none;
  }
  .canvas-empty{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-dim);
    text-align:center;
    line-height:1.7;
  }
  .canvas-meta{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    margin-top:10px;
    text-align:center;
  }
  .canvas-meta .ok{ color:var(--accent-go); }

  /* ---------- ログ ---------- */
  .log-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
  }
  .log-head button{
    font-family:var(--mono);
    font-size:11px;
    padding:5px 10px;
    border-radius:5px;
    border:1px solid var(--line);
    background:var(--panel-raised);
    color:var(--text-dim);
    cursor:pointer;
  }
  .log-head button:hover{ color:var(--accent-err); border-color:var(--accent-err); }

  #logBox{
    background:#0B0D10;
    border:1px solid var(--line);
    border-radius:7px;
    height:280px;
    overflow-y:auto;
    padding:10px;
    font-family:var(--mono);
    font-size:11px;
    line-height:1.6;
  }
  #logBox .line{ white-space:pre-wrap; word-break:break-all; }
  #logBox .t{ color:var(--text-dim); }
  .lv-send{ color:var(--accent-go); }
  .lv-recv{ color:#5EC2FF; }
  .lv-err{ color:var(--accent-err); }
  .lv-info{ color:var(--text-dim); }
</style>
</head>
<body>
<div class="app">

  <header class="head">
    <div class="head-title">m003_ws_png<span>Palette</span></div>
    <div class="head-meta">
      <div><b>mdID</b> <span class="val">0x17</span></div>
      <div><b>room</b> <span class="val">r001</span></div>
      <div><b>file</b> <span class="val">PNG8_500x500.png</span></div>
    </div>
  </header>

  <div class="conn-bar">
    <div class="conn-dot" id="connDot"></div>
    <span id="connText">disconnected</span>
    <input type="text" id="wsUrl" value="ws://127.0.0.1:9000" />
    <button id="btnConnect">Connect</button>
  </div>

  <div class="grid">

    <!-- ===== 左: 操作パネル ===== -->
    <div class="card">
      <h2>Operations</h2>
      <div class="btn-row">
        <button class="op-btn primary" id="btnA" disabled>
          Fetch Raw <span class="tag">A_RAW_REQUEST</span>
        </button>
        <button class="op-btn secondary" id="btnB" disabled>
          Apply Palette <span class="tag">B_PALETTE_APPLY</span>
        </button>
        <button class="op-btn danger" id="btnC" disabled>
          Clear Buffer <span class="tag">uiID=H</span>
        </button>
      </div>

      <h2>Palette Setting</h2>

      <div class="field">
        <label>Index (uiID=D) <span class="v" id="valD">0</span></label>
        <input type="number" id="inputD" min="0" max="15" step="1" value="0" />
      </div>

      <div class="field">
        <label>Red (uiID=E) <span class="v" id="valE">255</span></label>
        <input type="range" id="sliderE" class="slider-r" min="0" max="255" step="1" value="255" />
      </div>

      <div class="field">
        <label>Green (uiID=F) <span class="v" id="valF">0</span></label>
        <input type="range" id="sliderF" min="0" max="255" step="1" value="0" />
      </div>

      <div class="field">
        <label>Blue (uiID=G) <span class="v" id="valG">0</span></label>
        <input type="range" id="sliderG" min="0" max="255" step="1" value="0" />
      </div>

      <div class="palette-preview">
        <div class="swatch" id="swatchPreview" style="background:#FF0000;"></div>
        <div class="swatch-label">
          index <b id="swLabelIndex">0</b><br>
          rgb(<b id="swLabelRgb">255, 0, 0</b>)
        </div>
      </div>
    </div>

    <!-- ===== 中央: 画像表示エリア (uiID=H) ===== -->
    <div class="card">
      <h2>Buffer Display (uiID=H)</h2>
      <div class="canvas-wrap">
        <img id="imgDisplay" alt="png buffer" />
        <div class="canvas-empty" id="canvasEmpty">
          buffer is empty<br>
          press “Fetch Raw” or “Apply Palette”
        </div>
      </div>
      <div class="canvas-meta" id="canvasMeta">no data</div>
    </div>

    <!-- ===== 右: ログ ===== -->
    <div class="card card-log">
      <div class="log-head">
        <h2 style="margin:0;">Log</h2>
        <button id="btnClearLog">Clear</button>
      </div>
      <div id="logBox"></div>
    </div>

  </div>
</div>

<script>
(function(){
  "use strict";

  // ---------------- 定数 / プロトコル ----------------
  const MD_ID = 0x17;
  const ROOM_ID = "r001";

  const CMD = {
    RAW_REQUEST:   "A_RAW_REQUEST",
    PALETTE_APPLY: "B_PALETTE_APPLY",
    CLEAR_NOTIFY:  "C_CLEAR_NOTIFY"
  };

  // ---------------- DOM参照 ----------------
  const elConnDot   = document.getElementById("connDot");
  const elConnText  = document.getElementById("connText");
  const elWsUrl     = document.getElementById("wsUrl");
  const btnConnect  = document.getElementById("btnConnect");

  const btnA = document.getElementById("btnA"); // uiID=A
  const btnB = document.getElementById("btnB"); // uiID=B
  const btnC = document.getElementById("btnC"); // uiID=C

  const inputD  = document.getElementById("inputD");   // uiID=D
  const sliderE = document.getElementById("sliderE");   // uiID=E (R)
  const sliderF = document.getElementById("sliderF");   // uiID=F (G)
  const sliderG = document.getElementById("sliderG");   // uiID=G (B)

  const valD = document.getElementById("valD");
  const valE = document.getElementById("valE");
  const valF = document.getElementById("valF");
  const valG = document.getElementById("valG");

  const swatchPreview = document.getElementById("swatchPreview");
  const swLabelIndex   = document.getElementById("swLabelIndex");
  const swLabelRgb     = document.getElementById("swLabelRgb");

  const imgDisplay  = document.getElementById("imgDisplay"); // uiID=H
  const canvasEmpty = document.getElementById("canvasEmpty");
  const canvasMeta  = document.getElementById("canvasMeta");

  const logBox      = document.getElementById("logBox");
  const btnClearLog  = document.getElementById("btnClearLog");

  // ---------------- 状態 ----------------
  let socket = null;
  let pendingHeader = null; // 直前に受けたJSON(PNG_DATA)ヘッダ。次のBinaryフレームと対にする
  let currentObjectUrl = null;

  // ---------------- ログ ----------------
  function log(level, text){
    const time = new Date().toLocaleTimeString('ja-JP', { hour12:false }) +
                 '.' + String(new Date().getMilliseconds()).padStart(3,'0');
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = '<span class="t">' + time + '</span> ' +
                     '<span class="lv-' + level + '">' + escapeHtml(text) + '</span>';
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
  }
  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  btnClearLog.addEventListener('click', () => {
    logBox.innerHTML = '';
    log('info', '[UI] log cleared');
  });

  // ---------------- パレットプレビュー更新 ----------------
  function updatePalettePreview(){
    const d = clamp(parseInt(inputD.value || '0', 10), 0, 15);
    const r = parseInt(sliderE.value, 10);
    const g = parseInt(sliderF.value, 10);
    const b = parseInt(sliderG.value, 10);

    valD.textContent = d;
    valE.textContent = r;
    valF.textContent = g;
    valG.textContent = b;

    swatchPreview.style.background = `rgb(${r},${g},${b})`;
    swLabelIndex.textContent = d;
    swLabelRgb.textContent = `${r}, ${g}, ${b}`;
  }
  function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }

  inputD.addEventListener('input', () => {
    if (inputD.value !== '') {
      inputD.value = clamp(parseInt(inputD.value || '0', 10), 0, 15);
    }
    updatePalettePreview();
  });
  [sliderE, sliderF, sliderG].forEach(el => el.addEventListener('input', updatePalettePreview));
  updatePalettePreview();

  // ---------------- 接続管理 ----------------
  function setConnected(isLive){
    elConnDot.classList.toggle('live', isLive);
    elConnText.textContent = isLive ? 'connected — room ' + ROOM_ID : 'disconnected';
    btnA.disabled = !isLive;
    btnB.disabled = !isLive;
    btnC.disabled = !isLive;
    btnConnect.textContent = isLive ? 'Disconnect' : 'Connect';
  }

  function connect(){
    const url = elWsUrl.value.trim();
    if (!url) { log('err', '[UI] WebSocket URL is empty'); return; }

    log('info', '[UI] connecting to ' + url + ' ...');
    try {
      socket = new WebSocket(url);
    } catch (e) {
      log('err', '[UI] failed to create WebSocket: ' + e.message);
      return;
    }
    socket.binaryType = 'arraybuffer';

    socket.addEventListener('open', () => {
      log('info', '[WS] open');
      setConnected(true);
    });

    socket.addEventListener('close', (ev) => {
      log('info', '[WS] closed (code=' + ev.code + ')');
      setConnected(false);
      socket = null;
    });

    socket.addEventListener('error', () => {
      log('err', '[WS] error (see browser console)');
    });

    socket.addEventListener('message', onSocketMessage);
  }

  function disconnect(){
    if (socket) {
      socket.close();
    }
  }

  btnConnect.addEventListener('click', () => {
    if (socket) disconnect(); else connect();
  });

  // ---------------- 受信処理 (JSON / Binary) ----------------
  function onSocketMessage(ev){
    if (typeof ev.data === 'string') {
      handleJsonMessage(ev.data);
    } else {
      handleBinaryMessage(ev.data);
    }
  }

  function handleJsonMessage(text){
    log('recv', '[RECV][JSON] ' + text);
    let obj;
    try {
      obj = JSON.parse(text);
    } catch (e) {
      log('err', '[UI] failed to parse JSON from server: ' + e.message);
      return;
    }

    if (obj.mdID !== MD_ID) {
      log('err', '[UI] mdID mismatch: received=' + obj.mdID + ' expected=' + MD_ID);
    }

    switch (obj.res) {
      case 'PNG_DATA':
        // 次に来るBinaryフレームがこのヘッダに対応するPNGデータ
        pendingHeader = obj;
        log('info', '[UI] expecting binary PNG next: ' + obj.fileName +
                     ' (' + obj.byteLength + ' bytes, processed=' + obj.processed + ')');
        break;
      case 'ACK':
        log('info', '[UI] ACK: ' + obj.message);
        break;
      case 'ERROR':
        log('err', '[UI] ERROR from engine: ' + obj.message);
        break;
      default:
        log('info', '[UI] unrecognized JSON response: ' + text);
    }
  }

  function handleBinaryMessage(data){
    const bytes = data instanceof ArrayBuffer ? data.byteLength : (data.size || 0);
    log('recv', '[RECV][BIN] ' + bytes + ' bytes');

    if (!pendingHeader) {
      log('err', '[UI] received binary frame without a preceding PNG_DATA header (ignored)');
      return;
    }

    const header = pendingHeader;
    pendingHeader = null;

    if (header.byteLength !== bytes) {
      log('err', '[UI] byteLength mismatch: header=' + header.byteLength + ' actual=' + bytes);
    }

    const blob = new Blob([data], { type: 'image/png' });
    showImage(blob, header);
  }

  // ---------------- 画像表示エリア (uiID=H) ----------------
  function showImage(blob, header){
    if (currentObjectUrl) {
      URL.revokeObjectURL(currentObjectUrl);
    }
    currentObjectUrl = URL.createObjectURL(blob);
    imgDisplay.src = currentObjectUrl;
    imgDisplay.style.display = 'block';
    canvasEmpty.style.display = 'none';

    const kind = header.processed ? 'processed' : 'raw';
    canvasMeta.innerHTML = '<span class="ok">' + header.fileName + '</span> · ' +
                            header.byteLength + ' bytes · ' + kind;

    log('info', '[UI] buffer(uiID=H) updated: ' + header.fileName +
                 ' (' + kind + ', ' + header.byteLength + ' bytes)');
  }

  function clearBuffer(){
    if (currentObjectUrl) {
      URL.revokeObjectURL(currentObjectUrl);
      currentObjectUrl = null;
    }
    imgDisplay.src = '';
    imgDisplay.style.display = 'none';
    canvasEmpty.style.display = 'block';
    canvasMeta.textContent = 'no data';
    log('info', '[UI] buffer(uiID=H) cleared');
  }

  // ---------------- 送信処理 ----------------
  function sendJson(obj){
    if (!socket || socket.readyState !== WebSocket.OPEN) {
      log('err', '[UI] cannot send: socket not open');
      return;
    }
    const text = JSON.stringify(obj);
    socket.send(text);
    log('send', '[SEND][JSON] ' + text);
  }

  // ボタンA: 無加工PNGを要求
  btnA.addEventListener('click', () => {
    sendJson({
      mdID: MD_ID,
      room: ROOM_ID,
      cmd: CMD.RAW_REQUEST
    });
  });

  // ボタンB: パレット加工PNGを要求 (uiID=D,E,F,Gの現在値を送る)
  btnB.addEventListener('click', () => {
    const d = clamp(parseInt(inputD.value || '0', 10), 0, 15);
    const r = parseInt(sliderE.value, 10);
    const g = parseInt(sliderF.value, 10);
    const b = parseInt(sliderG.value, 10);

    sendJson({
      mdID: MD_ID,
      room: ROOM_ID,
      cmd: CMD.PALETTE_APPLY,
      palette: { index: d, r: r, g: g, b: b }
    });
  });

  // ボタンC: バッファ(uiID=H)のクリア。ローカルでクリアし、エンジンにも通知してログに残す
  btnC.addEventListener('click', () => {
    clearBuffer();
    sendJson({
      mdID: MD_ID,
      room: ROOM_ID,
      cmd: CMD.CLEAR_NOTIFY
    });
  });

  // ---------------- 初期ログ ----------------
  log('info', '[UI] m003_ws_pngPalette ready. mdID=0x' + MD_ID.toString(16) + ', room=' + ROOM_ID);
  setConnected(false);

})();
</script>
</body>
</html>
