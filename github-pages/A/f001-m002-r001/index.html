const WS_URL  = "ws://127.0.0.1:9000";

let ws = null;

function log(msg) {
  const t = new Date().toTimeString().slice(0,8);
  document.getElementById("log").textContent =
    "[" + t + "] " + msg + "\n" +
    document.getElementById("log").textContent;
}

function setStatus(msg, color) {
  const el = document.getElementById("status");
  el.textContent = "WS: " + msg;
  el.style.color = color || "#fa0";
}

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen    = () => { setStatus("接続中 ✓", "#4f4"); log("connected"); };
  ws.onclose   = () => { setStatus("切断", "#f44");     log("closed");    ws = null; };
  ws.onerror   = ()  => { setStatus("エラー", "#f44");  log("error"); };
  ws.onmessage = (e) => { log("← " + e.data); };
}

function send(obj) {
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    log("未接続 → 再接続します");
    connect();
    return;
  }
  ws.send(JSON.stringify(obj));
}

function sendLoad()    { send({ cmd:"load",    data: WAV_B64 }); log("→ cmd=load (" + WAV_B64.length + " chars)"); }
function sendPlay()    { send({ cmd:"play" });                    log("→ cmd=play"); }
function sendSilence() { send({ cmd:"silence" });                 log("→ cmd=silence"); }
